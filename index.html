<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alchemy Nails Limited</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
:root {
  --mulberry: #432430;
  --champagne: #CEB3AB;
  --indigo: #2A3548;
  --apricot: #E8AC97;
}

body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: linear-gradient(180deg, var(--mulberry), var(--indigo));
  color: white;
  overflow-x: hidden;
}

/* ✨ BACKGROUND SPARKLES */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(white 1px, transparent 1px);
  background-size: 35px 35px;
  opacity: 0.15;
  animation: sparkle 15s linear infinite;
}

@keyframes sparkle {
  from { transform: translateY(0); }
  to { transform: translateY(-150px); }
}

/* HEADER */
header {
  text-align: center;
  padding: 40px 20px;
}

.logo { width: 300px; }
.tagline { color: var(--champagne); }

.btn {
  display: block;
  margin: 15px auto;
  padding: 12px;
  border-radius: 30px;
  width: 200px;
  background: #25D366;
  text-align: center;
  color: white;
  text-decoration: none;
}

/* ABOUT */
.about {
  background: var(--champagne);
  color: var(--mulberry);
  margin: 20px;
  padding: 20px;
  border-radius: 20px;
}

/* 💅 GALLERY */
.gallery {
  position: relative;
  height: 500px;
}

.gallery img {
  position: absolute;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--champagne);
}

/* IMAGE POSITIONS */
.gallery img:nth-child(1){width:150px;height:150px;top:0;left:10%;}
.gallery img:nth-child(2){width:200px;height:200px;top:80px;left:45%;}
.gallery img:nth-child(3){width:140px;height:140px;top:260px;left:15%;}
.gallery img:nth-child(4){width:180px;height:180px;top:260px;left:60%;}
.gallery img:nth-child(5){width:130px;height:130px;top:130px;left:75%;}

/* 🦋 BUTTERFLY BASE */
.butterfly {
  position: absolute;
  width: 50px;
  pointer-events: none;
}

/* ✨ SPARKLE TRAIL */
.butterfly::after {
  content: "";
  position: absolute;
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  box-shadow:
    0 0 8px white,
    10px 5px 10px rgba(255,255,255,0.8),
    -10px 10px 12px rgba(232,172,151,0.7),
    15px -5px 15px rgba(206,179,171,0.8);
  animation: sparkleFade 1.5s infinite;
}

@keyframes sparkleFade {
  0% { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(0.5); }
}

/* 🦋 BUTTERFLY 1 PATH */
.butterfly.one {
  animation: flyOne 12s linear infinite;
}

@keyframes flyOne {
  0% { top: 10px; left: -10%; }
